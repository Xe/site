version: v2

managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: xeiaso.net/v4/gen
  disable:
    - module: buf.build/bufbuild/protovalidate
      file_option: go_package_prefix

plugins:
  - remote: buf.build/protocolbuffers/go
    out: gen
    opt:
      - paths=source_relative

  - remote: buf.build/grpc/go
    out: gen
    opt:
      - paths=source_relative

  - local: protoc-gen-twirp
    out: gen
    opt:
      - paths=source_relative
