syntax = "proto3";
package xeiaso.net.admin.v1;
option go_package = "adminv1";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "xeiaso/net/v1/xesite.proto";

service Patreon { rpc GetToken(google.protobuf.Empty) returns (PatreonToken); }

message PatreonToken {
  string access_token = 1;
  string token_type = 2;
  string refresh_token = 3;
  google.protobuf.Timestamp expiry = 4;
}

service Admin {
  rpc Rebuild(google.protobuf.Empty) returns (xeiaso.net.v1.BuildInfo);
}
