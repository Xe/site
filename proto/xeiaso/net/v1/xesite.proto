syntax = "proto3";
package xeiaso.net.v1;

import "external/protofeed/v1/protofeed.proto";
import "google/protobuf/timestamp.proto";

option go_package = "xesitev1";

// MetaService lets users fetch site metadata.
service MetaService {
  // Metadata fetches the build metadata of the version of xesite that is
  // currently running.
  rpc Metadata(MetadataRequest) returns (MetadataResponse);
}

// MetadataRequest is the request for MetaService.Metadata.
message MetadataRequest {}

// MetadataResponse is the response for MetaService.Metadata.
message MetadataResponse {
  // The build info of the currently running xesite instance.
  BuildInfo build_info = 1;
}

// BuildInfo contains metadata about a build of the site.
message BuildInfo {
  // The commit of Xe/site that was built
  string commit = 1;
  // When the site was last rebuilt
  google.protobuf.Timestamp build_time = 2;
  // The version of Go running on the server
  string go_version = 3;
  // The version of Deno used to build the site
  string deno_version = 4;
  // The version of the xesite binary
  string xesite_version = 5;
}

// FeedService lets users fetch the current feed of posts.
service FeedService {
  // Get fetches the current feed of posts.
  rpc Get(FeedServiceGetRequest) returns (FeedServiceGetResponse);
}

// FeedServiceGetRequest is the request for FeedService.Get.
message FeedServiceGetRequest {}

// FeedServiceGetResponse is the response for FeedService.Get.
message FeedServiceGetResponse {
  // The feed of posts.
  protofeed.Feed feed = 1;
}
