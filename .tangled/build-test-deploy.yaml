when:
  - event: ["push"]
    branch: ["main"]
  - event: ["pull_request"]
    branch: ["main"]

engine: nixery

tack:
  tekton:
    pipeline: xe-site-build-test-deploy
    workspaces:
      - name: repo-data
        access_modes: ["ReadWriteOnce"]
        storage: 1Gi
      - name: go-mod-cache
        pvc: go-mod-cache
      - name: dockerconfig-atcr
        secret: atcr
